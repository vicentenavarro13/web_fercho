<!DOCTYPE html>

    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<body>

<header class="header">
    <div class="container">
        <div class="logo">KAIROS</div>
        <nav>

        <h1>Contacto</h1>
        <p>Estamos disponibles para resolver tus dudas y coordinar recogidas.</p>
    </div>
</section>

<section class="beneficios">
    <div class="container">
        <h2>Escríbenos</h2>
        <div style="max-width:600px;margin-top:20px;">
            <form action="#" method="post">
                <label for="nombre">Nombre</label><br>
                <input id="nombre" name="nombre" type="text"><br>
                <label for="email">Email</label><br>
                <input id="email" name="email" type="email"><br>
                <label for="mensaje">Mensaje</label><br>
                <textarea id="mensaje" name="mensaje" rows="6"></textarea>
                <button type="submit" class="btn-primary">Enviar</button>
            </form>
            <p style="margin-top:12px;">O envía un correo a <a href="mailto:info@kairos.example">info@kairos.example</a></p>
        </div>
    </div>
</section>

    <div class="container">
        <p>© 2026 KAIROS · Reciclaje de baterías · Economía circular</p>
